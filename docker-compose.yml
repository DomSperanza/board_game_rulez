services:
  web:
    build: .
    ports:
      - "${HOST_PORT:-5000}:5000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:?set GEMINI_API_KEY in .env or the environment}
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      INDEX_PASSWORD: ${INDEX_PASSWORD}
    volumes:
      - board_rulez_data:/app/data

volumes:
  board_rulez_data:
